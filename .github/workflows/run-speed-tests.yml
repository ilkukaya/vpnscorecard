name: Monthly Speed Tests

on:
  schedule:
    - cron: '0 20 15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  speed-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install iperf3
        run: sudo apt-get install -y iperf3

      - run: pip install requests speedtest-cli

      - name: Run Speed Tests
        run: python scripts/run_speed_tests.py
        env:
          IPERF_SERVER: ${{ secrets.IPERF_SERVER }}
        continue-on-error: true

      - name: Save Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "VPNScorecard Bot"
          git add data/speed-tests.json
          git diff --staged --quiet || git commit -m \
            "Update speed test results: $(date '+%Y-%m-%d')"
          git push
