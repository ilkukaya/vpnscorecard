name: Weekly VPN Price Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 lxml

      - name: Update Prices
        run: python scripts/update_pricing.py
        continue-on-error: true

      - name: Validate
        run: python scripts/validate_data.py

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "VPNScorecard Bot"
          git add data/pricing.json data/deals.json
          git diff --staged --quiet || git commit -m \
            "Update VPN prices: $(date '+%Y-%m-%d')"
          git push
